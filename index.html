<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>현대카드 지출 트래커</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
  <!-- Lock Screen -->
  <div id="lockScreen" class="lock-screen">
    <div class="lock-box">
      <h2>현대카드 지출 트래커</h2>
      <p>비밀번호를 입력하세요</p>
      <input type="password" id="lockPassword" placeholder="비밀번호" autocomplete="off">
      <button class="btn btn-primary" id="btnUnlock" style="width:100%;margin-top:12px;">확인</button>
      <p id="lockError" style="color:var(--red);font-size:13px;margin-top:8px;"></p>
    </div>
  </div>

  <div class="container" id="appContainer" style="display:none;">
    <header>
      <h1>현대카드 지출 트래커</h1>
      <div class="header-actions">
        <button class="btn btn-primary" id="btnAdd">+ 수동 입력</button>
      </div>
    </header>

    <!-- Summary -->
    <div class="summary-grid" id="summaryGrid">
      <div class="summary-card">
        <div class="label">오늘 지출</div>
        <div class="value value-red" id="todayTotal">-</div>
        <div class="sub" id="todayCount">-</div>
      </div>
      <div class="summary-card">
        <div class="label">이번 주</div>
        <div class="value value-orange" id="weekTotal">-</div>
        <div class="sub" id="weekAvg">-</div>
      </div>
      <div class="summary-card">
        <div class="label">이번 달</div>
        <div class="value value-blue" id="monthTotal">-</div>
        <div class="sub" id="monthCount">-</div>
      </div>
      <div class="summary-card">
        <div class="label">올해 총 지출</div>
        <div class="value value-green" id="yearTotal">-</div>
        <div class="sub" id="yearMonthAvg">-</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab active" data-tab="dashboard">대시보드</button>
      <button class="tab" data-tab="transactions">거래 내역</button>
      <button class="tab" data-tab="analysis">분석</button>
    </div>

    <!-- Dashboard Tab -->
    <div id="tab-dashboard" class="tab-content">
      <div class="period-selector">
        <select id="chartPeriod">
          <option value="week">최근 7일</option>
          <option value="month" selected>이번 달</option>
          <option value="3months">최근 3개월</option>
          <option value="year">올해</option>
        </select>
      </div>

      <div class="chart-grid">
        <div class="chart-card full-width">
          <h3>일별 지출 추이</h3>
          <canvas id="dailyChart"></canvas>
        </div>
        <div class="chart-card">
          <h3>카테고리별 지출</h3>
          <canvas id="categoryChart"></canvas>
        </div>
        <div class="chart-card">
          <h3>카테고리별 비율</h3>
          <canvas id="categoryPieChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Transactions Tab -->
    <div id="tab-transactions" class="tab-content" style="display:none">
      <div class="period-selector">
        <input type="month" id="txMonth">
        <select id="txCategory">
          <option value="">전체 카테고리</option>
        </select>
        <input type="text" id="txSearch" placeholder="가맹점 검색..." style="padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;">
      </div>

      <div class="transaction-list" id="transactionList">
        <div class="transaction-header">
          <h3>거래 내역</h3>
          <span id="txCount" style="color:var(--text-dim);font-size:14px;"></span>
        </div>
        <div id="txBody"></div>
      </div>
    </div>

    <!-- Analysis Tab -->
    <div id="tab-analysis" class="tab-content" style="display:none">
      <div class="period-selector">
        <select id="analysisPeriod">
          <option value="monthly">월별 비교</option>
          <option value="weekday">요일별 패턴</option>
          <option value="hourly">시간대별 패턴</option>
          <option value="top-stores">자주 가는 가맹점</option>
        </select>
      </div>

      <div class="chart-grid">
        <div class="chart-card full-width">
          <h3 id="analysisTitle">월별 지출 비교</h3>
          <canvas id="analysisChart"></canvas>
        </div>
        <div class="chart-card full-width" id="analysisDetail">
          <h3 id="analysisDetailTitle">상세</h3>
          <canvas id="analysisDetailChart"></canvas>
        </div>
      </div>
    </div>

  </div>

  <!-- Add Transaction Modal -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <h2>지출 입력</h2>
      <div class="form-row">
        <div class="form-group">
          <label>날짜</label>
          <input type="date" id="formDate">
        </div>
        <div class="form-group">
          <label>시간</label>
          <input type="time" id="formTime">
        </div>
      </div>
      <div class="form-group">
        <label>가맹점</label>
        <input type="text" id="formStore" placeholder="가맹점 이름">
      </div>
      <div class="form-group">
        <label>위치</label>
        <input type="text" id="formLocation" placeholder="서울특별시">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>금액 (원)</label>
          <input type="number" id="formAmount" placeholder="0">
        </div>
        <div class="form-group">
          <label>카테고리</label>
          <select id="formCategory">
            <option value="식비">식비</option>
            <option value="편의점">편의점</option>
            <option value="마트/쇼핑">마트/쇼핑</option>
            <option value="교통">교통</option>
            <option value="문화/여가">문화/여가</option>
            <option value="의료">의료</option>
            <option value="통신">통신</option>
            <option value="구독">구독</option>
            <option value="기타생활">기타생활</option>
            <option value="기타">기타</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>메모 (선택)</label>
        <textarea id="formMemo" rows="2" placeholder="메모"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="btnCancelAdd">취소</button>
        <button class="btn btn-primary" id="btnSubmitAdd">저장</button>
      </div>
    </div>
  </div>

  <!-- Category Edit Modal -->
  <div class="modal-overlay" id="categoryModal">
    <div class="modal">
      <h2>카테고리 변경</h2>
      <div class="form-group">
        <label>카테고리</label>
        <select id="editCategory">
          <option value="식비">식비</option>
          <option value="편의점">편의점</option>
          <option value="마트/쇼핑">마트/쇼핑</option>
          <option value="교통">교통</option>
          <option value="문화/여가">문화/여가</option>
          <option value="의료">의료</option>
          <option value="통신">통신</option>
          <option value="구독">구독</option>
          <option value="기타생활">기타생활</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="btnCancelCategory">취소</button>
        <button class="btn btn-primary" id="btnSaveCategory">저장</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toasts"></div>

  <script>
    const PASS_HASH = '310288168ef50596bf48fc950ce60688b924012cdc888e777ba08806b9a8df98';

    async function sha256(text) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function unlockApp() {
      document.getElementById('lockScreen').style.display = 'none';
      document.getElementById('appContainer').style.display = 'block';
    }

    if (sessionStorage.getItem('unlocked') === 'true') {
      unlockApp();
    }

    document.getElementById('btnUnlock').addEventListener('click', async () => {
      const pw = document.getElementById('lockPassword').value;
      const hash = await sha256(pw);
      if (hash === PASS_HASH) {
        sessionStorage.setItem('unlocked', 'true');
        unlockApp();
      } else {
        document.getElementById('lockError').textContent = '비밀번호가 틀렸습니다.';
      }
    });

    document.getElementById('lockPassword').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btnUnlock').click();
    });
  </script>
  <script src="js/app.js"></script>
</body>
</html>
